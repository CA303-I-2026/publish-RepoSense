name: CI

on:
  pull_request:
  push:
    branches:
      - master
  # For scheduled deployment with Cron Jobs.
  ## Examples of cron schedule expressions:
  ### '0 * * * *': hourly
  ### '0 0 * * *': daily
  ### '0 0 1 * *': monthly
  schedule:
    - cron: '0 0 * * *'

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 11
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '11'
    
    - name: Install dependencies
      run: pip install requests

    - name: Generate report
      run: |
        export VITE_BASE_DIR="/$(basename $GITHUB_REPOSITORY)/"
        echo "VITE_BASE_DIR: $VITE_BASE_DIR"
        ./run.sh

    - name: Verify all groups are in the report
      run: |
        GROUPS=(
          "CA303-I-2026_Grupo-1-Los-bigotes-de-FM_main"
          "CA303-I-2026_Grupo-2_main"
          "CA303-I-2026_Grupo-3-p-0.05_main"
          "CA303-I-2026_Grupo-4-Martingalianos_main"
          "CA303-I-2026_Grupo-5-Alpha-Epsilon_main"
          "CA303-I-2026_Grupo-6_main"
        )
        FAILED=0
        for group in "${GROUPS[@]}"; do
          if [ ! -d "./reposense-report/$group" ]; then
            echo "ERROR: Group directory $group is missing from the report!"
            FAILED=1
          fi
        done
        if [ $FAILED -eq 1 ]; then
          echo "One or more groups are missing from the report. Check the RepoSense logs above for errors."
          exit 1
        fi
        echo "All groups are present in the report."

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: reposense-report
        path: ./reposense-report


  deploy:
    needs: build
    runs-on: ubuntu-24.04
    if: (github.event_name == 'push' && github.ref == 'refs/heads/master') || github.event_name == 'schedule'
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: reposense-report
          path: ./reposense-report

      - name: Deploy GitHub pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./reposense-report
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
          commit_message: Rebuild pages at
